# Deploy Paradiso sulla VPS al push su main
# Configura in GitHub: Settings → Secrets and variables → Actions
#   - VPS_HOST (es. 46.224.55.248)
#   - VPS_USER (es. deploy)
#   - VPS_SSH_KEY (chiave privata SSH per deploy)

name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            DEPLOY_PATH="${{ secrets.VPS_PATH }}"
            if [ -z "$DEPLOY_PATH" ]; then DEPLOY_PATH="$HOME/paradiso"; fi
            cd "$DEPLOY_PATH"
            git fetch origin
            git reset --hard origin/main
            cd backend && npm ci --omit=dev && cd ..
            cd frontend && npm ci && npm run build && cd ..
            (cd "$DEPLOY_PATH/backend" && pm2 restart paradiso-api) || (cd "$DEPLOY_PATH/backend" && pm2 start index.js --name paradiso-api)
            (cd "$DEPLOY_PATH/frontend" && pm2 restart paradiso-web) || (cd "$DEPLOY_PATH/frontend" && pm2 start "npx serve -s dist -l 3000" --name paradiso-web)
            pm2 save
            echo "Deploy completato."
