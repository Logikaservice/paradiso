# Paradiso - sviluppo locale con PostgreSQL
# Uso: docker compose up -d
# Poi: backend con .env DATABASE_URL, frontend con npm run dev

version: "3.8"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: paradiso
      POSTGRES_PASSWORD: paradiso
      POSTGRES_DB: paradiso
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paradiso"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
